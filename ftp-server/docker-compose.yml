services:
  ftp:
    image: fauria/vsftpd
    container_name: test-ftp-server
    ports:
      - "20:20"
      - "21:21"
      - "21100-21110:21100-21110"
    environment:
      - FTP_USER=user
      - FTP_PASS=password
      - PASV_ADDRESS=localhost
      - PASV_MIN_PORT=21100
      - PASV_MAX_PORT=21110
      - WRITE_ENABLE=YES
    volumes:
      - ./data:/home/vsftpd
